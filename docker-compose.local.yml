# ============================================================
# docker-compose.local.yml — stack standalone com Traefik próprio
#
# Usar para: dev local (junto com docker-compose.override.yml) ou
# deploy em VPS isolada, sem um Traefik compartilhado já rodando.
# Sobe Traefik próprio (rede `sentinel`, portas 80/443/8080).
#
# NÃO é o arquivo usado na VPS compartilhada (opencheck) — lá o
# Hostinger Docker Manager e o CI usam docker-compose.yml (raiz),
# que reaproveita o Traefik já rodando (traefik-traefik-1).
#
# Comandos (sempre com -f explícito, não é mais o docker-compose.yml
# padrão):
#   docker compose -f docker-compose.local.yml -f docker-compose.override.yml up -d
#   docker compose -f docker-compose.local.yml -f docker-compose.override.yml build
# ============================================================

services:
  # ============================================================
  # postgres — persistent relational store
  # ============================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel

  # ============================================================
  # redis — pub/sub for Socket.IO adapter + BullMQ + rate limiting
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel

  # ============================================================
  # garage — Garage v2 single-node S3-compatible object storage
  # --single-node --default-bucket flags auto-create:
  #   - the lpr-images bucket
  #   - the GK-prefixed access key from GARAGE_DEFAULT_ACCESS_KEY
  # STORAGE-01 requirement fulfilled on first start.
  # ============================================================
  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: lpr-images
      GARAGE_CONFIG_FILE: /etc/garage.toml
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - sentinel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.garage.rule=Host(`${PUBLIC_DOMAIN}`) && PathPrefix(`/media`)"
      - "traefik.http.routers.garage.priority=20"
      - "traefik.http.routers.garage.entrypoints=websecure"
      - "traefik.http.routers.garage.tls.certresolver=letsencrypt"
      - "traefik.http.services.garage.loadbalancer.server.port=3900"

  # ============================================================
  # api — Express LPR ingestion + REST API + Socket.IO
  # Priority 30 (highest): /api path matched before /media and /
  # ============================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # AWS SDK v3 + Garage checksum compatibility
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
      # Z-API — Client-Token global opcional (fallback quando a empresa não
      # tem um Client-Token próprio); credenciais por empresa ficam no banco
      # (ConfiguracaoWhatsApp), provisionadas pelo SUPER_ADMIN.
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN}
      # Thumbnail proxy URL — browser loads images via Next.js proxy (no public Garage tunnel)
      THUMBNAIL_PROXY_URL: "${WEB_PUBLIC_URL}/api/image-proxy"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    networks:
      - sentinel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${PUBLIC_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/NotificationInfo`))"
      - "traefik.http.routers.api.priority=30"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  # ============================================================
  # web — Next.js 15 dashboard
  # Priority 10 (lowest/catch-all): all paths not matched above
  # ============================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
      INTERNAL_API_URL: http://api:4000
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${WEB_PUBLIC_URL}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel}@postgres:5432/${POSTGRES_DB:-cargo_sentinel}?schema=public"
      GARAGE_INTERNAL_URL: "http://garage:3900"
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: "lpr-images"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sentinel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.web.priority=10"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # ============================================================
  # traefik v3 — TLS termination + reverse proxy
  # Routes: /api (30) > /media (20) > / (10)
  # acme.json mounted from host for Let's Encrypt persistence (INFRA-05)
  # Docker socket mounted read-only (accepted risk T-1-E1: single-tenant VPS)
  # ============================================================
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--ping=true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - sentinel

networks:
  sentinel:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  garage-meta:
  garage-data:
