services:
  # ============================================================
  # postgres — persistent relational store
  # ============================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel

  # ============================================================
  # redis — pub/sub for Socket.IO adapter + BullMQ + rate limiting
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel

  # ============================================================
  # garage — Garage v2 single-node S3-compatible object storage
  # --single-node --default-bucket flags auto-create:
  #   - the lpr-images bucket
  #   - the GK-prefixed access key from GARAGE_DEFAULT_ACCESS_KEY
  # STORAGE-01 requirement fulfilled on first start.
  # ============================================================
  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: lpr-images
      GARAGE_CONFIG_FILE: /etc/garage.toml
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3900/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sentinel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.garage.rule=Host(`${PUBLIC_DOMAIN}`) && PathPrefix(`/media`)"
      - "traefik.http.routers.garage.priority=20"
      - "traefik.http.routers.garage.entrypoints=websecure"
      - "traefik.http.routers.garage.tls.certresolver=letsencrypt"
      - "traefik.http.services.garage.loadbalancer.server.port=3900"

  # ============================================================
  # api — Express LPR ingestion + REST API + Socket.IO
  # Priority 30 (highest): /api path matched before /media and /
  # ============================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # AWS SDK v3 + Garage checksum compatibility
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
      # Evolution API — WhatsApp alerts (ALERTS-01, ALERTS-03)
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-cargo-sentinel}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
      evolution-api:
        # evolution-api can be slow to start; keep service_started to avoid blocking api
        condition: service_started
    networks:
      - sentinel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${PUBLIC_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/NotificationInfo`))"
      - "traefik.http.routers.api.priority=30"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  # ============================================================
  # evolution-api — WhatsApp messaging via Evolution API v2.2.3
  # HARD-PINNED: v2.2.3 — highest stable v2 tag on Docker Hub (2025-02-03).
  # DO NOT upgrade to v2.4.0+ (requires external license server activation
  # — breaks self-hosted SLAs). v2.3.7 tag does not exist in atendai registry.
  # ALERTS-01: internal only, not exposed via Traefik
  # ============================================================
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    restart: unless-stopped
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://evolution-api:8080}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      REDIS_PREFIX_KEY: evolution
      WEBHOOK_GLOBAL_ENABLED: "false"
      STORE_MESSAGES: "false"
      STORE_MESSAGE_UP: "false"
      STORE_CONTACTS: "false"
      STORE_CHATS: "false"
      DEL_INSTANCE: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel

  # ============================================================
  # web — Next.js 15 dashboard
  # Priority 10 (lowest/catch-all): all paths not matched above
  # ============================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:3000
      INTERNAL_API_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sentinel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.web.priority=10"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # ============================================================
  # traefik v3 — TLS termination + reverse proxy
  # Routes: /api (30) > /media (20) > / (10)
  # acme.json mounted from host for Let's Encrypt persistence (INFRA-05)
  # Docker socket mounted read-only (accepted risk T-1-E1: single-tenant VPS)
  # ============================================================
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--ping=true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - sentinel

networks:
  sentinel:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  garage-meta:
  garage-data:
  evolution-instances:
