# ============================================================
# docker-compose.vps.yml — produção na VPS (193.203.182.2)
#
# Formato idêntico ao opencheck:
#   - Imagens prontas do ghcr.io (build acontece no GitHub Actions)
#   - Traefik COMPARTILHADO da VPS (container traefik-traefik-1,
#     network_mode: host) — este compose NÃO sobe Traefik próprio
#   - Rede externa `proxy` (criar antes: docker network create proxy)
#
# Deploy:
#   /docker/cargo-sentinel/docker-compose.yml  (este arquivo, renomeado)
#   /docker/cargo-sentinel/.env               (baseado em .env.example)
#   /docker/cargo-sentinel/garage/garage.toml (copiar do repo)
#
# DNS (Cloudflare, registros A → 193.203.182.2, SEM tunnel):
#   portal.ggtronic.com.br            → web  (3000)
#   lpr.ggtronic.com.br               → api  (4000) — câmeras LPR já apontam aqui
#   storage.sentinel.ggtronic.com.br  → garage (3900) — presigned URLs de relatórios
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: cargo-sentinel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cargo_sentinel}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cargo-sentinel_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: cargo-sentinel_garage
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: lpr-images
      GARAGE_CONFIG_FILE: /etc/garage.toml
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sentinel-storage.rule=Host(`storage.sentinel.ggtronic.com.br`)"
      - "traefik.http.routers.sentinel-storage.entrypoints=websecure"
      - "traefik.http.routers.sentinel-storage.tls.certresolver=letsencrypt"
      - "traefik.http.services.sentinel-storage.loadbalancer.server.port=3900"

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: cargo-sentinel_evolution
    restart: unless-stopped
    environment:
      SERVER_URL: http://evolution-api:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cargo_sentinel}
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      REDIS_PREFIX_KEY: evolution
      WEBHOOK_GLOBAL_ENABLED: "false"
      STORE_MESSAGES: "false"
      STORE_MESSAGE_UP: "false"
      STORE_CONTACTS: "false"
      STORE_CHATS: "false"
      DEL_INSTANCE: "false"
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  migrate:
    image: ghcr.io/arnaldomb/cargo-sentinel-migrate:latest
    restart: "no"
    command: >
      sh -c "
        pnpm --filter @cargo-sentinel/database run db:push &&
        pnpm --filter @cargo-sentinel/database run seed
      "
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cargo_sentinel}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  api:
    image: ghcr.io/arnaldomb/cargo-sentinel-api:latest
    container_name: cargo-sentinel_api
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cargo_sentinel}?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      # Garage S3
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_INTERNAL_URL: http://garage:3900
      GARAGE_SERVER_URL: ${GARAGE_SERVER_URL}
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
      # Miniaturas via proxy do Next.js (mesmo domínio do portal)
      THUMBNAIL_PROXY_URL: ${WEB_PUBLIC_URL}/api/image-proxy
      # Evolution API — WhatsApp
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-cargo-sentinel}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sentinel-api.rule=Host(`lpr.ggtronic.com.br`)"
      - "traefik.http.routers.sentinel-api.entrypoints=websecure"
      - "traefik.http.routers.sentinel-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.sentinel-api.loadbalancer.server.port=4000"

  web:
    image: ghcr.io/arnaldomb/cargo-sentinel-web:latest
    container_name: cargo-sentinel_web
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      # OBRIGATÓRIO com Traefik host-mode: Next.js binda no container ID sem isso
      HOSTNAME: "0.0.0.0"
      AUTH_TRUST_HOST: "true"
      INTERNAL_API_URL: http://api:4000
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${WEB_PUBLIC_URL}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cargo_sentinel}?schema=public
      # Garage — usado pelo /api/image-proxy
      GARAGE_INTERNAL_URL: http://garage:3900
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: lpr-images
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sentinel-web.rule=Host(`portal.ggtronic.com.br`)"
      - "traefik.http.routers.sentinel-web.entrypoints=websecure"
      - "traefik.http.routers.sentinel-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.sentinel-web.loadbalancer.server.port=3000"

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  pg-data:
  redis-data:
  garage-meta:
  garage-data:
  evolution-instances:
